<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Financial independence forecaster preview</title>
  <desc id="desc">Dashboard style preview with FI metrics and trend chart.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <rect x="48" y="48" width="1104" height="624" rx="20" fill="#111827" stroke="#334155" stroke-width="2" />

  <text x="92" y="116" fill="#e2e8f0" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif">
    Financial Independence Forecaster
  </text>
  <text x="92" y="150" fill="#94a3b8" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif">
    Forecast outputs and FI timing signals
  </text>

  <rect x="92" y="188" width="310" height="120" rx="14" fill="#1e293b" />
  <rect x="422" y="188" width="310" height="120" rx="14" fill="#1e293b" />
  <rect x="752" y="188" width="310" height="120" rx="14" fill="#1e293b" />

  <text x="116" y="230" fill="#94a3b8" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">FI date</text>
  <text x="116" y="272" fill="#f8fafc" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif">2065-05</text>

  <text x="446" y="230" fill="#94a3b8" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Years until FI</text>
  <text x="446" y="272" fill="#f8fafc" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif">39.1</text>

  <text x="776" y="230" fill="#94a3b8" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Passive income</text>
  <text x="776" y="272" fill="#f8fafc" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif">Ł30,222</text>

  <rect x="92" y="336" width="970" height="288" rx="16" fill="#0b1220" stroke="#334155" />
  <line x1="132" y1="574" x2="1024" y2="574" stroke="#334155" />
  <line x1="132" y1="374" x2="132" y2="574" stroke="#334155" />

  <polyline
    fill="none"
    stroke="url(#line)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="152,548 232,538 312,522 392,500 472,472 552,444 632,404 712,368 792,330 872,284 952,236 1012,210"
  />

  <text x="138" y="604" fill="#64748b" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Now</text>
  <text x="960" y="604" fill="#64748b" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">FI horizon</text>
</svg>
