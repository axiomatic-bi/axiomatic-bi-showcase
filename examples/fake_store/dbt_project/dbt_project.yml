name: "fake_store"
version: "1.0.0"
config-version: 2

profile: "fake_store"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  fake_store:
    silver:
      +materialized: view
      +schema: "{{ env_var('AXIOMATIC_SCHEMA_SILVER', 'silver') }}"
    gold:
      +materialized: table
      +schema: "{{ env_var('AXIOMATIC_SCHEMA_GOLD', 'gold') }}"
    analytics:
      +materialized: view
      +schema: "{{ env_var('AXIOMATIC_SCHEMA_ANALYTICS', 'analytics') }}"
